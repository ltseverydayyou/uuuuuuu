<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#7B4DFF">
  <title>Nameless Admin Docs</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08080c;
      --panel: #11111a;
      --text: #f5f5f7;
      --muted: #b8b8c8;
      --line: #242436;
      --accent: #7B4DFF;
      --accent2: #b15cff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(123, 77, 255, 0.22), transparent 34rem),
        radial-gradient(circle at top right, rgba(177, 92, 255, 0.16), transparent 28rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    a {
      color: #bda8ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem max(1rem, calc((100vw - 980px) / 2));
      background: rgba(8, 8, 12, 0.78);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    header h1 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }

    .support {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.25rem;
      padding: 0 1rem;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 0.75rem 2rem rgba(123, 77, 255, 0.22);
    }

    .support:hover {
      text-decoration: none;
      filter: brightness(1.08);
    }

    main {
      width: min(980px, calc(100% - 2rem));
      margin: 2rem auto 5rem;
      padding: clamp(1rem, 3vw, 2rem);
      background: rgba(17, 17, 26, 0.82);
      border: 1px solid var(--line);
      border-radius: 1.25rem;
      box-shadow: 0 1.5rem 5rem rgba(0, 0, 0, 0.28);
    }

    h1, h2, h3, h4 {
      line-height: 1.25;
    }

    h2 {
      margin-top: 2.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--line);
    }

    p, li {
      color: var(--muted);
    }

    code {
      padding: 0.12rem 0.35rem;
      border-radius: 0.35rem;
      background: #050509;
      color: #f8f8ff;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }

    pre {
      overflow: auto;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: 0.85rem;
      background: #050509;
    }

    pre code {
      padding: 0;
      background: transparent;
    }

    blockquote {
      margin: 1rem 0;
      padding: 0.75rem 1rem;
      border-left: 3px solid var(--accent);
      background: rgba(123, 77, 255, 0.08);
      border-radius: 0.5rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 0.75rem;
    }

    th, td {
      padding: 0.7rem;
      border: 1px solid var(--line);
    }

    th {
      background: rgba(123, 77, 255, 0.12);
    }

    @media (max-width: 640px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      .support {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Nameless Admin Docs</h1>
    <a class="support" href="https://ko-fi.com/ltseverydayyou" target="_blank" rel="noopener noreferrer">Support Nameless Admin</a>
  </header>

  <main id="docs">Loading docs...</main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const docs = document.getElementById("docs");

    fetch("README.md", { cache: "no-store" })
      .then(function(res) {
        if (!res.ok) throw new Error("README.md failed to load");
        return res.text();
      })
      .then(function(text) {
        docs.innerHTML = marked.parse(text);
      })
      .catch(function() {
        docs.innerHTML = "<h2>Nameless Admin Docs</h2><p>Failed to load README.md. Use the repository README as a fallback.</p>";
      });
  </script>
  <script src="https://storage.ko-fi.com/cdn/scripts/overlay-widget.js"></script>
  <script>
    kofiWidgetOverlay.draw("ltseverydayyou", {
      "type": "floating-chat",
      "floating-chat.donateButton.text": "Support Nameless Admin",
      "floating-chat.donateButton.background-color": "#7B4DFF",
      "floating-chat.donateButton.text-color": "#ffffff"
    });
  </script>
</body>
</html>
